<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareAlert - Doctor Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stamp {
            border: 2px solid #9ca3af; /* Tailwind gray-400 */
            color: #9ca3af;
            font-weight: 800;
            text-transform: uppercase;
            padding: 4px 16px;
            border-radius: 8px;
            transform: rotate(-10deg);
            display: inline-block;
            font-size: 0.875rem;
            letter-spacing: 0.1em;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(0,0,0,0.02);
            pointer-events: none;
            user-select: none;
        }
        /* Mobile usability scroll hide */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col selection:bg-indigo-100">
    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-20 px-4 py-3 flex justify-between items-center shadow-sm">
        <a href="doctor.html" class="text-xl font-bold text-gray-900 flex items-center gap-2 hover:text-indigo-600 transition">
            CareAlert 🏥
        </a>
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-sm font-medium text-gray-500 hover:text-indigo-600 transition tracking-tight">Nurse Entry</a>
            <span class="bg-indigo-50 text-indigo-700 border border-indigo-200 px-3 py-1 rounded-full text-xs font-bold shadow-sm hidden sm:inline-flex">Doctor View</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 p-4 sm:p-6 max-w-6xl mx-auto w-full relative">
        <!-- Dashboard Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900">Physician Dashboard</h1>
                <p class="text-gray-500 text-sm mt-1">Live triage feeds refreshing automatically every 30s.</p>
            </div>
            <button id="clearBtn" class="text-sm text-gray-400 hover:text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-lg transition font-medium flex items-center gap-1 active:scale-95">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                Clear Records
            </button>
        </div>

        <!-- Stat Cards -->
        <div class="grid grid-cols-3 gap-2 md:gap-5 mb-5">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-3 md:p-5 flex flex-col justify-center transition hover:shadow-md">
                <p class="text-[10px] sm:text-xs font-bold text-gray-400 uppercase tracking-wide mb-1 leading-tight line-clamp-1">Total Patients Today</p>
                <div class="text-2xl sm:text-4xl font-black text-gray-900" id="statTotal">0</div>
            </div>
            <div class="bg-red-50 rounded-2xl shadow-sm border border-red-100 p-3 md:p-5 flex flex-col justify-center transition hover:shadow-md">
                <p class="text-[10px] sm:text-xs font-bold text-red-500 uppercase tracking-wide mb-1 flex items-center gap-1 leading-tight line-clamp-1"><span class="hidden sm:inline">🔴</span> High Risk</p>
                <div class="text-2xl sm:text-4xl font-black text-red-700" id="statHigh">0</div>
            </div>
            <div class="bg-orange-50 rounded-2xl shadow-sm border border-orange-100 p-3 md:p-5 flex flex-col justify-center transition hover:shadow-md">
                <p class="text-[10px] sm:text-xs font-bold text-orange-600 uppercase tracking-wide mb-1 flex items-center gap-1 leading-tight line-clamp-1"><span class="hidden sm:inline">⚠</span> Needs Attention</p>
                <div class="text-2xl sm:text-4xl font-black text-orange-700" id="statAttention">0</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="bg-white p-2 rounded-xl border border-gray-100 shadow-sm flex overflow-x-auto gap-2 mb-6 hide-scroll relative">
            <button class="filter-btn active-filter px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap transition active:scale-95" data-filter="all">All Patients</button>
            <button class="filter-btn text-gray-500 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap transition active:scale-95 border border-transparent" data-filter="high">🔴 High Risk</button>
            <button class="filter-btn text-gray-500 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap transition active:scale-95 border border-transparent" data-filter="medium">🟡 Medium Risk</button>
            <button class="filter-btn text-gray-500 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap transition active:scale-95 border border-transparent" data-filter="low">🟢 Low Risk</button>
        </div>

        <!-- Patients List -->
        <div id="patientsContainer" class="flex flex-col gap-5 pb-10">
            <!-- Cards mapped here via JS -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-24 px-4 bg-white/50 rounded-3xl border-2 border-dashed border-gray-200">
            <div class="text-6xl mb-4 opacity-80 mix-blend-multiply">🛌👨‍⚕️</div>
            <h2 class="text-xl font-bold text-gray-900 tracking-tight">No patients submitted yet.</h2>
            <p class="text-gray-500 mt-2">Waiting for nurse triage reports from the field.</p>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        let currentFilter = 'all';

        // Set up filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // reset all tabs
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active-filter', 'bg-indigo-50', 'text-indigo-700', 'border-indigo-100');
                    b.classList.add('text-gray-500', 'border-transparent');
                });
                // set current
                const target = e.currentTarget;
                target.classList.add('active-filter', 'bg-indigo-50', 'text-indigo-700', 'border-indigo-100');
                target.classList.remove('text-gray-500', 'border-transparent');
                
                currentFilter = target.getAttribute('data-filter');
                renderPatients(); // Update the DOM visually instantly
            });
        });
        
        // Initial manual active class apply for first load on 'All'
        const initialBtn = document.querySelector('.filter-btn[data-filter="all"]');
        initialBtn.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-100');
        initialBtn.classList.remove('text-gray-500', 'border-transparent');

        // Risk Style Map
        function getRiskStyles(risk) {
            switch(risk) {
                case 'high': return { badge: 'bg-red-50 text-red-700 border-red-200', icon: '🔴', border: 'border-l-red-500' };
                case 'medium': return { badge: 'bg-yellow-50 text-yellow-700 border-yellow-200', icon: '🟡', border: 'border-l-yellow-400' };
                case 'low': return { badge: 'bg-green-50 text-green-700 border-green-200', icon: '🟢', border: 'border-l-green-500' };
                default: return { badge: 'bg-gray-50 text-gray-700 border-gray-200', icon: '⚪', border: 'border-l-gray-300' };
            }
        }

        function timeAgo(ms) {
            const elapsed = Date.now() - ms;
            const mins = Math.floor(elapsed / 60000);
            const hours = Math.floor(mins / 60);
            const days = Math.floor(hours / 24);
            if (mins < 1) return "just now";
            if (mins < 60) return `${mins}m ago`;
            if (hours < 24) return `${hours}h ago`;
            return `${days}d ago`;
        }

        function toggleReview(event, id) {
            const section = document.getElementById(`review-section-${id}`);
            const textEl = document.getElementById(`rev-btn-text-${id}`);
            if (section.classList.contains('hidden')) {
                section.classList.remove('hidden');
                section.classList.add('fade-in');
            } else {
                section.classList.add('hidden');
                section.classList.remove('fade-in');
            }
        }
        
        function saveReview(id) {
            const status = document.getElementById(`rev-status-${id}`).value;
            const notes = document.getElementById(`rev-notes-${id}`).value;
            const date = document.getElementById(`rev-date-${id}`).value;
            
            updatePatientReview(id, { status, notes, date });
            renderPatients();
        }

        // Relative time helper string parser
        function parseTimeRepresentation(timestampStr, idNum) {
            // E.g. parses ID explicitly back into relative formatting if allowed, else use direct timestamp formatting.
            // Requirement specified mapping "10:32 AM" or similar formatted stamps that already natively exist in patient.timestamp string.
            if(timestampStr) {
                return timestampStr.split(',')[0]; // Grabs just "12:15 PM" from standard data.js array element string.
            }
            return "Just now";
        }

        // Fired when Action buttons clicked on cards
        function handleAction(patientId, actionType, btnElement) {
            updatePatientAction(patientId, actionType);
            renderPatients(); 
        }

        // Core Render Map
        function renderPatients() {
            const allPatients = getPatients();
            const container = document.getElementById('patientsContainer');
            const emptyState = document.getElementById('emptyState');
            
            // Statistics Calculation Logic
            let highCount = 0;
            let medCount = 0;
            allPatients.forEach(p => {
                const r = (p.risk || '').toLowerCase();
                if (r === 'high') highCount++;
                if (r === 'medium') medCount++;
            });
            
            // Update Top Board Elements
            document.getElementById('statTotal').textContent = allPatients.length;
            document.getElementById('statHigh').textContent = highCount;
            document.getElementById('statAttention').textContent = highCount + medCount;
            
            // Filter mapping application
            let filtered = allPatients;
            if (currentFilter !== 'all') {
                filtered = allPatients.filter(p => (p.risk || '').toLowerCase() === currentFilter);
            }
            
            container.innerHTML = '';
            
            // Empty view handler
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                container.classList.add('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            container.classList.remove('hidden');
            
            // Intelligent Sorting
            const riskWeight = { high: 3, medium: 2, low: 1 };
            filtered.sort((a, b) => {
                const wA = riskWeight[(a.risk || '').toLowerCase()] || 0;
                const wB = riskWeight[(b.risk || '').toLowerCase()] || 0;
                if (wA !== wB) return wB - wA;
                return Number(b.id) - Number(a.id); // Newer sub priorities within the same risk branch
            });
            
            // HTML Node building loop
            filtered.forEach(patient => {
                const r = (patient.risk || '').toLowerCase();
                const styles = getRiskStyles(r);
                
                // Form Variables Configuration Mapping
                const age = patient.age || '?';
                const gender = patient.gender || '?';
                const village = patient.village || 'No Village';
                const hospital = patient.hospital || 'Unallocated';
                const submittedTime = parseTimeRepresentation(patient.timestamp, patient.id);
                
                // AI Result Fallbacks
                const likelyCond = patient.aiResult?.likely_condition || patient.condition || 'Awaiting Triage Processing';
                const specialist = patient.aiResult?.specialist_needed || 'Determine upon review';
                const recommendedAction = patient.aiResult?.action || 'Review nurse assessment immediately and call patient.';
                
                // Construct stamp/action row markup
                let actionsHTML = '';
                if (patient.actionTaken) {
                    actionsHTML = `
                        <div class="mt-6 flex flex-col md:flex-row md:items-center justify-between border-t border-gray-100 pt-5 gap-3">
                            <div class="stamp opacity-80 scale-95 origin-left tracking-wider">${patient.actionTaken}</div>
                            <span class="text-xs text-gray-400 font-semibold uppercase tracking-widest pl-2">Action recorded at ${patient.actionTimestamp}</span>
                        </div>
                    `;
                } else {
                    actionsHTML = `
                        <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-3 border-t border-gray-100 pt-5">
                            <button onclick="handleAction('${patient.id}', '📞 Called Patient', this)" class="bg-white border border-gray-200 hover:bg-gray-50 text-gray-800 font-bold py-3 px-4 rounded-xl shadow-sm transition flex items-center justify-center gap-2 active:scale-95 text-sm sm:text-base">
                                📞 Call Patient
                            </button>
                            <button onclick="handleAction('${patient.id}', '🏥 Visit Scheduled', this)" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-200 transition flex items-center justify-center gap-2 active:scale-95 text-sm sm:text-base">
                                🏥 Schedule Visit
                            </button>
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = `fade-in bg-white rounded-3xl shadow-sm hover:shadow-md transition-shadow duration-300 p-5 sm:p-7 border border-gray-100 border-l-4 ${styles.border} flex flex-col relative overflow-hidden`;
                
                card.innerHTML = `
                    <div class="flex flex-col sm:flex-row justify-between items-start gap-4 mb-3">
                        <div class="w-full sm:w-auto">
                            <div class="flex items-center gap-3 mb-1">
                                <h3 class="text-xl sm:text-2xl font-black text-gray-900 leading-tight">
                                    ${patient.name} 
                                </h3>
                                <span class="text-xs font-bold text-gray-600 bg-gray-100 px-2.5 py-1 rounded-md border border-gray-200">${age} ${gender.charAt(0)}</span>
                            </div>
                            <p class="text-sm font-semibold text-gray-500 flex items-center gap-1.5 mt-2">
                                <span class="bg-gray-100 p-1 rounded">🏠</span>
                                <span class="max-w-[120px] sm:max-w-none truncate" title="${village}">${village}</span>
                                <span class="mx-1 text-gray-300">→</span> 
                                <span class="bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded font-bold border border-blue-100 max-w-[150px] sm:max-w-none truncate" title="${hospital}">${hospital}</span>
                            </p>
                        </div>
                        <div class="flex sm:flex-col items-center sm:items-end justify-between w-full sm:w-auto gap-2 sm:gap-1.5">
                            <div class="flex flex-col items-end gap-1.5">
                                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-black border ${styles.badge} whitespace-nowrap">
                                    ${styles.icon} <span class="uppercase">${patient.risk} Risk</span>
                                </span>
                                ${patient.review ? `<span class="text-[10px] font-bold text-gray-400 tracking-wide bg-gray-50 px-2 py-1 rounded-md border border-gray-100 flex items-center gap-1 mt-1"><span>Doctor reviewed</span><span>·</span><span>${timeAgo(patient.review.timestamp)}</span></span>` : ''}
                            </div>
                            <span class="text-xs font-bold text-gray-400 opacity-90 tracking-wide mt-1">${submittedTime}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-5">
                        <div class="bg-gray-50/50 p-3.5 rounded-2xl border border-gray-100">
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-1.5 ml-1">Likely Condition</span>
                            <p class="text-gray-900 font-bold ml-1">${likelyCond}</p>
                        </div>
                        <div class="bg-gray-50/50 p-3.5 rounded-2xl border border-gray-100">
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-1.5 ml-1">Specialist Needed</span>
                            <p class="text-gray-900 font-bold ml-1">${specialist}</p>
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest block mb-1.5 ml-1">Doctor Recommended Action</span>
                        <div class="bg-indigo-50/60 border border-indigo-100 p-4 rounded-2xl flex items-start gap-4">
                            <span class="text-2xl mt-0.5 opacity-80 block min-w-8 text-center">🎯</span>
                            <p class="text-indigo-900 font-bold text-[15px] leading-snug">${recommendedAction}</p>
                        </div>
                    </div>
                    
                    ${actionsHTML}
                    
                    <div class="mt-5 pt-4 border-t border-gray-100">
                        <button onclick="toggleReview(event, '${patient.id}')" class="text-sm font-bold text-indigo-600 hover:text-indigo-800 transition flex items-center gap-1.5 focus:outline-none bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-lg border border-indigo-100 active:scale-95">
                            <span id="rev-btn-text-${patient.id}">${patient.review ? '✏️ Edit Review' : '📝 Write Review'}</span>
                        </button>
                        
                        <div id="review-section-${patient.id}" class="hidden mt-4 bg-gray-50/80 rounded-xl p-4 sm:p-5 border border-gray-200 shadow-inner">
                            <div class="flex flex-col gap-4">
                                <div>
                                    <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Status</label>
                                    <select id="rev-status-${patient.id}" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm font-semibold text-gray-800 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-white">
                                        <option value="" disabled ${!patient.review?.status ? 'selected' : ''}>Select status...</option>
                                        <option value="Called Patient" ${patient.review?.status === 'Called Patient' ? 'selected' : ''}>Called Patient</option>
                                        <option value="Visit Scheduled" ${patient.review?.status === 'Visit Scheduled' ? 'selected' : ''}>Visit Scheduled</option>
                                        <option value="Referred to Specialist" ${patient.review?.status === 'Referred to Specialist' ? 'selected' : ''}>Referred to Specialist</option>
                                        <option value="Closed" ${patient.review?.status === 'Closed' ? 'selected' : ''}>Closed</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Doctor Notes</label>
                                    <textarea id="rev-notes-${patient.id}" rows="3" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm font-medium text-gray-800 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-white placeholder-gray-400" placeholder="Type your observations here...">${patient.review?.notes || ''}</textarea>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Next Follow-up Date</label>
                                    <input type="date" id="rev-date-${patient.id}" value="${patient.review?.date || ''}" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm font-semibold text-gray-800 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-white">
                                </div>
                                <div class="flex justify-end mt-1">
                                    <button onclick="saveReview('${patient.id}')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2.5 px-6 rounded-xl shadow-sm transition active:scale-95 flex items-center gap-2">
                                        Save Review
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        // Immediately Paint Initial Set Native Data
        renderPatients();

        // Core requirement automatically looping 30 second refresh triggers
        setInterval(() => {
            console.log("30s interval: Fetching live new records asynchronously.");
            renderPatients();
        }, 30000);

        // Native API auto updates via internal Event hooks across browser processes
        window.addEventListener('storage', (e) => {
            if (e.key === 'carealert_patients') {
                renderPatients();
            }
        });

        // Debug Clean Trigger Logic Safety
        document.getElementById('clearBtn').addEventListener('click', () => {
             const pts = getPatients();
             if (pts.length === 0) return;
             if (confirm('Are you heavily certain you want to CLEAR ALL records from the internal Doctor Dashboard storage mapping?')) {
                 clearPatients();
                 renderPatients();
             }
        });
    </script>
</body>
</html>

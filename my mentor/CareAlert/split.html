<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareAlert — Live Hackathon Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        @media (max-width: 768px) {
            .split-container { flex-direction: column; }
            iframe { height: 50vh; width: 100%; border-bottom: 4px solid #1f2937; }
        }
    </style>
</head>
<body class="bg-gray-900 h-screen w-screen overflow-hidden flex flex-col">

    <!-- Demo Presentation Header -->
    <div class="h-14 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-6 shrink-0 shadow-md z-10">
        <div class="font-black text-white tracking-widest text-lg flex items-center gap-2">
            CareAlert <span class="text-indigo-400">⚡ Live Split-Screen Demo</span>
        </div>
        <div class="flex items-center gap-6 text-xs font-bold uppercase tracking-widest text-gray-400 hidden sm:flex">
            <span class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> Field Nurse Device (Tablet)
            </span>
            <span class="text-gray-600 text-lg">⇄</span>
            <span class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> District Doctor Monitor (Desktop)
            </span>
        </div>
    </div>
    
    <!-- Split Screen View -->
    <div class="flex-grow flex split-container w-full h-full relative">
        
        <!-- Field Nurse Sandbox (Left) -->
        <div class="w-full sm:w-1/2 h-full border-r border-gray-700 bg-white relative">
            <div class="absolute top-0 right-0 bg-blue-600 text-white text-[10px] uppercase font-black px-4 py-1.5 rounded-bl-xl z-50 shadow-md tracking-widest">
                Nurse View
            </div>
            <iframe src="index.html" class="w-full h-full border-none"></iframe>
        </div>
        
        <!-- Doctor Dashboard Sandbox (Right) -->
        <div class="w-full sm:w-1/2 h-full bg-white relative">
            <div class="absolute top-0 right-0 bg-emerald-600 text-white text-[10px] uppercase font-black px-4 py-1.5 rounded-bl-xl z-50 shadow-md tracking-widest">
                Doctor View
            </div>
            <iframe src="doctor.html" class="w-full h-full border-none"></iframe>
        </div>
        
    </div>

</body>
</html>
